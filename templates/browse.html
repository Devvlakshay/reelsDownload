{% extends "base.html" %}
{% block content %}
<div class="min-h-screen">
    <!-- Header -->
    <header class="h-[50px] flex items-center justify-between px-4 md:px-8 border-b border-gray-100">
        <a href="/" class="text-lg font-bold no-underline text-gray-900">ReelGrab<span class="text-blue-600">.App</span></a>
    </header>

    <div class="max-w-3xl md:w-2/4 mx-auto px-3 py-6">
        <a href="/" class="inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-gray-600 no-underline mb-6 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
        </a>

        <h1 class="text-xl font-bold text-gray-900 mb-5">Browse Creators</h1>

        <form id="browseForm" onsubmit="handleBrowseSubmit(event)" class="mb-8">
            <div class="h-12 border border-gray-300 rounded-lg flex items-center px-3 bg-white focus-within:border-blue-500 focus-within:shadow-md transition-all">
                <svg class="w-4 h-4 text-gray-400 mr-2 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="browseInput" type="text" placeholder="Channel name, @username, or playlist URL..."
                    class="flex-1 bg-transparent border-none outline-none text-sm font-semibold text-gray-800 placeholder-gray-400 min-w-0">
                <button type="submit" id="browseBtn"
                    class="ml-2 h-8 px-4 rounded-md bg-blue-600 text-white text-sm font-medium border-none cursor-pointer shadow-md hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                    Search
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-2">Try: mkbhd, @natgeo, or a YouTube playlist URL</p>
        </form>

        <!-- Loading -->
        <div id="browseLoading" class="hidden">
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <div><div class="skeleton aspect-video rounded-lg"></div><div class="mt-2 space-y-2"><div class="skeleton h-3 rounded w-4/5"></div><div class="skeleton h-2.5 rounded w-1/2"></div></div></div>
                <div><div class="skeleton aspect-video rounded-lg"></div><div class="mt-2 space-y-2"><div class="skeleton h-3 rounded w-4/5"></div><div class="skeleton h-2.5 rounded w-1/2"></div></div></div>
                <div><div class="skeleton aspect-video rounded-lg"></div><div class="mt-2 space-y-2"><div class="skeleton h-3 rounded w-4/5"></div><div class="skeleton h-2.5 rounded w-1/2"></div></div></div>
            </div>
        </div>

        <!-- Results -->
        <div id="browseResults" class="animate-in hidden"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function formatDuration(seconds) {
        if (!seconds || seconds < 0) return '0:00';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) return `${hrs}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        return `${mins}:${String(secs).padStart(2, '0')}`;
    }

    function formatViews(count) {
        if (!count) return '0';
        if (count >= 1000000) return (count / 1000000).toFixed(1) + 'M';
        if (count >= 1000) return (count / 1000).toFixed(1) + 'K';
        return String(count);
    }

    function detectPlatform(url) {
        const lower = url.toLowerCase();
        if (lower.includes('youtube.com') || lower.includes('youtu.be')) return 'youtube';
        if (lower.includes('instagram.com') || lower.includes('instagr.am')) return 'instagram';
        return null;
    }

    function videoCardHTML(video) {
        const dur = video.duration_formatted || formatDuration(video.duration);
        const views = video.view_count > 0 ? `<p class="text-[11px] text-gray-400 mt-0.5">${formatViews(video.view_count)} views</p>` : '';
        const thumb = video.thumbnail
            ? `<img src="${video.thumbnail}" alt="" class="w-full h-full object-cover" loading="lazy">`
            : `<div class="w-full h-full flex items-center justify-center text-gray-300 text-xs">No preview</div>`;
        const durBadge = dur && dur !== '0:00'
            ? `<span class="absolute bottom-1.5 right-1.5 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded">${dur}</span>` : '';
        return `
            <div class="cursor-pointer group" onclick="goToVideo('${(video.url || '').replace(/'/g, "\\'")}', '${video.id || ''}')">
                <div class="relative aspect-video bg-gray-100 rounded-lg overflow-hidden">
                    ${thumb}
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-all flex items-center justify-center">
                        <div class="w-10 h-10 rounded-full bg-white/90 shadow-sm flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4 text-gray-800 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </div>
                    </div>
                    ${durBadge}
                </div>
                <div class="mt-2">
                    <p class="text-xs font-semibold text-gray-800 leading-snug line-clamp-2">${video.title || 'Untitled'}</p>
                    ${views}
                </div>
            </div>`;
    }

    function goToVideo(url, id) {
        const videoUrl = url || `https://www.youtube.com/watch?v=${id}`;
        window.location.href = `/?url=${encodeURIComponent(videoUrl)}`;
    }

    async function handleBrowseSubmit(e) {
        e.preventDefault();
        const val = document.getElementById('browseInput').value.trim();
        if (!val) return;

        document.getElementById('browseLoading').classList.remove('hidden');
        document.getElementById('browseResults').classList.add('hidden');
        document.getElementById('browseBtn').disabled = true;
        document.getElementById('browseBtn').innerHTML = '<svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';

        try {
            if (val.includes('playlist') || val.includes('list=')) {
                const res = await apiPost('/api/youtube/playlist', { playlist_url: val });
                renderPlaylist(res.data);
            } else if (detectPlatform(val) === 'instagram' || val.startsWith('@')) {
                const username = val.replace(/^@/, '').replace(/.*instagram\.com\//, '').replace(/\/$/, '');
                const res = await apiPost('/api/instagram/profile', { username });
                renderProfile(res.data);
            } else {
                const name = val.replace(/^@/, '');
                const res = await apiPost('/api/youtube/channel', { channel_name: name });
                renderChannel(res.data);
            }
        } catch (err) {
            showToast(err.message || 'Not found');
        } finally {
            document.getElementById('browseLoading').classList.add('hidden');
            document.getElementById('browseBtn').disabled = false;
            document.getElementById('browseBtn').textContent = 'Search';
        }
    }

    function renderChannel(data) {
        const subs = data.subscriber_count > 0 ? `<p class="text-xs text-gray-500 mt-0.5">${data.subscriber_count.toLocaleString()} subscribers</p>` : '';
        const grid = data.videos.map(v => videoCardHTML(v)).join('');
        document.getElementById('browseResults').innerHTML = `
            <div class="mb-5">
                <p class="text-base font-bold text-gray-900">${data.channel_name}</p>
                ${subs}
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">${grid}</div>`;
        document.getElementById('browseResults').classList.remove('hidden');
    }

    function renderPlaylist(data) {
        const items = data.videos.map((v, i) => {
            const dur = v.duration_formatted || formatDuration(v.duration);
            const thumb = v.thumbnail
                ? `<img src="${v.thumbnail}" alt="" class="w-full aspect-video object-cover rounded-md bg-gray-100">`
                : `<div class="w-full aspect-video bg-gray-100 rounded-md"></div>`;
            return `
                <div onclick="goToVideo('${(v.url || '').replace(/'/g, "\\'")}', '${v.id || ''}')"
                    class="flex items-center gap-3 py-2.5 hover:bg-gray-50 -mx-2 px-2 rounded-lg transition-colors cursor-pointer group">
                    <span class="text-xs text-gray-300 w-5 text-right shrink-0 tabular-nums">${i + 1}</span>
                    <div class="w-20 shrink-0">${thumb}</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold text-gray-800 truncate">${v.title}</p>
                        <p class="text-[11px] text-gray-400 mt-0.5">${dur}</p>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('browseResults').innerHTML = `
            <div class="mb-5">
                <p class="text-base font-bold text-gray-900">${data.title}</p>
                <p class="text-xs text-gray-500 mt-0.5">${data.video_count} videos</p>
            </div>
            <div class="divide-y divide-gray-100">${items}</div>`;
        document.getElementById('browseResults').classList.remove('hidden');
    }

    function renderProfile(data) {
        const pic = data.profile_pic ? `<img src="${data.profile_pic}" alt="" class="w-11 h-11 rounded-full object-cover bg-gray-100">` : '';
        const grid = (data.posts || []).map(post => {
            const isVideo = post.is_video || post.type === 'reel';
            return videoCardHTML({
                title: post.caption || 'Untitled',
                thumbnail: post.thumbnail || post.url,
                duration: post.video_duration,
                view_count: post.likes,
                url: isVideo ? (post.url || `https://www.instagram.com/reel/${post.shortcode}/`) : '',
                id: post.shortcode,
                _isVideo: isVideo,
            });
        }).join('');
        document.getElementById('browseResults').innerHTML = `
            <div class="flex items-center gap-3 mb-5">
                ${pic}
                <div>
                    <p class="text-base font-bold text-gray-900">${data.full_name || data.username}</p>
                    <p class="text-xs text-gray-500">${(data.followers || 0).toLocaleString()} followers</p>
                </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 animate-in">${grid}</div>`;
        document.getElementById('browseResults').classList.remove('hidden');
    }
</script>
{% endblock %}
